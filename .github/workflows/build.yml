name: Build Client Onboarding API

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show repository structure (DEBUG)
        run: ls -R

      - name: Show test files (DEBUG)
        run: find . -name "*Test.java"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: bash mvnw clean verify
